# VMAS Navigation场景 - WPO算法配置

[ENV_CONFIG]
scenario = vmas_navigation
agent = wpo_cu
n_agent = 4
seed = 1212

# VMAS特定参数
vmas_scenario = navigation
num_envs = 1
max_steps = 200
continuous_actions = True
device = cuda

# Navigation场景参数
n_obstacles = 2
shared_rew = True
observe_all_goals = False

# 协作参数
coop_gamma = 0.9
use_gpu = True

[MODEL_CONFIG]
# 优化器
rmsp_alpha = 0.99
rmsp_epsilon = 1e-5

# 网络架构
num_fc = 128
num_lstm = 128

# 学习率
lr_init = 1e-4
lr_min = 1e-6
lr_decay = linear

# 损失系数
value_coef = 1.0
entropy_coef = 0.005
max_grad_norm = 5.0

# 折扣因子
gamma = 0.99

# 奖励处理
reward_norm = 0
reward_clip = 10.0

# Batch
batch_size = 60

# WPO特定参数
use_variance_rescaling = True
epsilon_mean = 0.0025
epsilon_stddev = 1e-6
policy_loss_scale = 1.0
kl_loss_scale = 1.0
dual_loss_scale = 1.0

[TRAIN_CONFIG]
total_step = 1000000
test_interval = 5000
log_interval = 1000
save_interval = 10000
