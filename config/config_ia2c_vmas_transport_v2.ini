[ENV_CONFIG]
scenario = vmas_transport
agent = ia2c
n_agent = 4
seed = 1212
vmas_scenario = transport
num_envs = 1
max_steps = 420
continuous_actions = True
device = cuda
coop_gamma = 0.9
use_gpu = True
n_packages = 1
shared_rew = True

[MODEL_CONFIG]
rmsp_alpha = 0.99
rmsp_epsilon = 1e-5
num_fc = 128
num_lstm = 128
lr_init = 1e-4
lr_min = 1e-6
lr_decay = linear
value_coef = 1.0
entropy_coef = 0.01
max_grad_norm = 5.0
gamma = 0.99
reward_norm = 0
reward_clip = 10.0
batch_size = 60

[TRAIN_CONFIG]
total_step = 1000000
test_interval = 10000
log_interval = 1000
save_interval = 20000
