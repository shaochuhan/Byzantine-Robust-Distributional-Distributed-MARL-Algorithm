[MODEL_CONFIG]
rmsp_alpha = 0.99 
rmsp_epsilon = 1e-5 
; max_grad_norm = 10
; max_grad_norm = 1
gamma = 0.99
; lr_init = 5e-4
; lr_init = 1e-4
; 学习率调度：从常数改为逐步衰减
lr_decay = linear
; 最小学习率（linear decay需要）
lr_min = 1e-6
; 熵系数：增加探索，减少过早收敛
entropy_coef = 0.1
; 价值损失系数：增加以稳定训练
value_coef = 1.0
num_lstm = 64
num_fc = 64
batch_size = 60
reward_norm = 800.0
reward_clip = -1 
; v5
; max_grad_norm = 40
; lr_init = 5e-4
; v6
; max_grad_norm = 10
; lr_init = 1e-4

; v8 - 稳定性优先版本
; max_grad_norm = 5.0
; lr_init = 5e-5

; v9 
max_grad_norm = 3.0
lr_init = 7e-5


; delta_max = 0.3
; tau_omega = 1.0
; tau_theta = 0.5
; T_c = 1.0

delta_max = 0.5      
tau_omega = 0.5      
tau_theta = 0.3      
T_c = 0.5           

[TRAIN_CONFIG]
total_step = 1e6
test_interval = 2e6
log_interval = 1e3

[ENV_CONFIG]
control_interval_sec = 0.1
episode_length_sec = 60
agent = coomed_rod2ac
batch_size = 60
coop_gamma = -1
; constraints
headway_min = 1
headway_st = 5
headway_go = 35
speed_max = 30
accel_max = 2.5
accel_min = -2.5 
reward_v = 3.0
reward_u = 0.05
collision_penalty = 400
headway_target = 15
speed_target = 15
norm_headway = 10
norm_speed = 7.5
; n_vehicle = 8
n_vehicle = 6
scenario = cacc_catchup
; seed = 12
; seed = 42
seed = 123
test_seeds = 10000
yellow_interval_sec = 2
use_gpu = True

[ROBUST_CONFIG]
# 轻量级鲁棒机制配置
# Byzantine容忍度：移除距离最远的f个邻居
byzantine_tolerance = 1
