[MODEL_CONFIG]
# 优化器参数
rmsp_alpha = 0.99
rmsp_epsilon = 1e-5

# 网络架构
num_fc = 128        
num_lstm = 128      

# 学习率设置
# 修改: 添加学习率衰减以提高后期稳定性
   
lr_min = 1e-6     
lr_decay = linear   

# 损失系数
# 修改: 增加value_coef以提高价值网络稳定性\
; ;v1
; lr_init = 5e-4
; value_coef = 0.5    
; entropy_coef = 0.05 
;v4
; lr_init = 1e-4  
; value_coef = 0.5    
; entropy_coef = 0.01  
;v5
lr_init = 5e-5  
value_coef = 0.25    
entropy_coef = 0.05  
;v6
; lr_init = 3e-5  
; value_coef = 0.25    
; entropy_coef = 0.05  
; ;v7
; lr_init = 5e-5  
; value_coef = 0.25    
; entropy_coef = 0.25  


# 梯度裁剪
# 修改: 降低梯度裁剪阈值防止大幅更新
max_grad_norm = 5.0  

# 折扣因子
gamma = 0.99

# 奖励处理
; reward_norm = 0     
; reward_clip = 0     
reward_norm = 5000.0     
reward_clip = -1
   
# 批次大小
batch_size = 60

[TRAIN_CONFIG]
; total_step = 20000
; log_interval = 500
; test_interval = 2000
total_step = 1e6
test_interval = 2e6
log_interval = 1e3
save_interval = 10000

[ENV_CONFIG]
scenario = cacc_slowdown
control_interval_sec = 0.1
episode_length_sec = 60
agent = wpo_cu
batch_size = 60
; coop_gamma = -1
coop_gamma = 0.9
; constraints
headway_min = 1
headway_st = 5
headway_go = 35
speed_max = 30
accel_max = 2.5
accel_min = -2.5 
; reward 
; reward_v = 1
; reward_u = 0.1
reward_v = 5
reward_u = 0.5
; collision_penalty = 1000
collision_penalty = 500
headway_target = 20
speed_target = 15
norm_headway = 10
norm_speed = 7.5
n_vehicle = 6
seed = 42
test_seeds = 10000
yellow_interval_sec = 2
use_gpu = True
 

[WPO_SPECIFIC]
# WPO 算法特定参数

# 是否使用方差缩放技巧 (论文 Section 5)
use_variance_rescaling = True

# KL 正则化系数
kl_coef_mean = 0.01   
kl_coef_std = 10.0     

# 动作采样数 (用于估计 Q 梯度)
n_action_samples = 5

# 初始策略标准差# log(std), std ≈ 0.37
init_log_std = -1.0    

# 标准差裁剪范围
min_std = 0.01
max_std = 2.0
