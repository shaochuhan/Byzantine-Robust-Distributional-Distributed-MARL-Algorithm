[MODEL_CONFIG]
# 优化器参数
rmsp_alpha = 0.99
rmsp_epsilon = 1e-5

# 网络架构
num_fc = 128        
num_lstm = 128      

# 学习率设置
# 修改: 添加学习率衰减以提高后期稳定性
lr_init = 1e-4    
lr_min = 1e-6     
lr_decay = linear   

# 损失系数
# 修改: 增加value_coef以提高价值网络稳定性
value_coef = 1.0    
entropy_coef = 0.005  

# 梯度裁剪
# 修改: 降低梯度裁剪阈值防止大幅更新
max_grad_norm = 5.0  

# 折扣因子
gamma = 0.99

# 奖励处理
; reward_norm = 0     
; reward_clip = 0     
reward_norm = 5000.0     
reward_clip = -1
   
# 批次大小
batch_size = 60     



[ENV_CONFIG]
# Wasserstein Policy Optimization (WPO) Configuration
# 基于 Pfau et al. 2025 论文

# 场景选择: grid_world, cacc_catchup, vmas_navigation
scenario = grid_world
# 算法名称
agent = wpo_cu

# Grid World 环境参数
nrow = 5
ncol = 5
n_agent = 5
n_states = 2
n_actions = 5

# 初始状态和目标状态
initial_state = [[0,0],[0,1],[1,2],[1,3],[2,4]]
desired_state = [[4,4],[4,3],[4,2],[2,3],[1,3]]

# 是否随机化状态
randomize_state = False
# 合作折扣因子
coop_gamma = 0.9
# 随机种子
seed = 1
use_gpu = True

[TRAIN_CONFIG]
# 训练配置

# 总训练步数
total_step = 1000000
# 测试间隔
test_interval = 5000
# 日志间隔  
log_interval = 1000
# 保存间隔
save_interval = 10000

[WPO_SPECIFIC]
# WPO 算法特定参数

# 是否使用方差缩放技巧 (论文 Section 5)
use_variance_rescaling = True

# KL 正则化系数
kl_coef_mean = 0.01   
kl_coef_std = 10.0     

# 动作采样数 (用于估计 Q 梯度)
n_action_samples = 5

# 初始策略标准差# log(std), std ≈ 0.37
init_log_std = -1.0    

# 标准差裁剪范围
min_std = 0.01
max_std = 2.0
