[MODEL_CONFIG]
rmsp_alpha = 0.99
rmsp_epsilon = 1e-5
; max_grad_norm = 40
max_grad_norm = 1
gamma = 0.99
; lr_init = 5e-4
lr_init = 1e-4
lr_decay = constant
entropy_coef = 0.05
value_coef = 0.5
num_lstm = 64
num_fc = 64
; batch_size = 60
batch_size = 50
; same nodes may be updated by ~8 propagations,
; adjust norm accordingly
reward_norm = 5000.0
reward_clip = -1

[TRAIN_CONFIG]
total_step = 1e6
test_interval = 1e7
log_interval = 1e3


[ENV_CONFIG]
scenario = vmas_navigation
agent = ma2c_cnet
seed = 42
episode_length_sec = 60

# 基本环境参数
n_agent = 3
max_steps = 100
device = cuda
use_gpu = True
# Navigation场景特定参数
; n_obstacles = 4
observe_all_goals = false
shared_reward = true
collision_penalty = -0.1
goal_reward = 1.0
; min_distance_between_entities = 0.1

# 合作参数
coop_gamma = 0.9

# 如果使用分布式算法
n_states = 6  # Navigation场景的典型状态维度
n_actions = 2  # 连续动作空间维度(x, y)