[MODEL_CONFIG]
# 网络结构参数
net_width = 128
net_depth = 3

rmsp_alpha = 0.99 
rmsp_epsilon = 1e-5 
gamma = 0.99
lr_decay = constant
entropy_coef = 0.05 
value_coef = 0.5 
num_lstm = 64
num_fc = 64
batch_size = 20
reward_norm = 800.0
reward_clip = -1 
; v5
; max_grad_norm = 40
; lr_init = 5e-4
; v6
; max_grad_norm = 10
; lr_init = 1e-4
; v7
max_grad_norm = 10
lr_init = 1e-4

# A2C参数
value_coeff = 0.5
entropy_coeff = 0.01
grad_clip = 0.5
# 其他训练参数
replay_buffer_size = 10000


[TRAIN_CONFIG]
total_step = 1000000
test_interval = 5000
log_interval = 500
# 训练参数
num_episodes = 2000
max_episode_length = 100
update_interval = 20
# 保存和评估
save_interval = 10000
eval_episodes = 10


[ENV_CONFIG]
scenario = vmas_navigation
agent = d2ac_cu
seed = 42

# 基本环境参数
n_agent = 3
max_steps = 100
device = cuda
use_gpu = True
# Navigation场景特定参数
; n_obstacles = 4
observe_all_goals = false
shared_reward = true
collision_penalty = -0.1
goal_reward = 1.0
; min_distance_between_entities = 0.1

# 合作参数
coop_gamma = 0.9

# 如果使用分布式算法
n_states = 6  # Navigation场景的典型状态维度
n_actions = 2  # 连续动作空间维度(x, y)