[MODEL_CONFIG]
rmsp_alpha = 0.99
rmsp_epsilon = 1e-5
; max_grad_norm = 40
gamma = 0.99
; lr_init = 5e-4
lr_decay = constant
entropy_coef = 0.05
value_coef = 0.5
num_lstm = 64
num_fc = 64
batch_size = 60
reward_norm = 800.0
reward_clip = -1
; v1
max_grad_norm = 1
lr_init = 1e-4

[TRAIN_CONFIG]
total_step = 1e6
test_interval = 2e6
log_interval = 1e3

[ENV_CONFIG]
scenario = grid_world
agent = ia2c
seed = 0
nrow = 10
ncol = 10
n_agent = 5
randomize_state = False
initial_state = [[0,0],[0,1],[1,2],[1,3],[2,4]]
desired_state = [[4,4],[4,3],[4,2],[2,3],[1,3]]
use_gpu = True
coop_gamma = -1
