[MODEL_CONFIG]
rmsp_alpha = 0.99 
rmsp_epsilon = 1e-5 
; max_grad_norm = 40
max_grad_norm = 1
; lr_init = 5e-4
lr_init = 1e-4
entropy_coef = 0.05 
; entropy_coef = 0.1
batch_size = 60
gamma = 0.99
lr_decay = constant
value_coef = 0.5 
num_lstm = 64
num_fc = 64
reward_norm = 800.0
reward_clip = -1 

[TRAIN_CONFIG]
; total_step = 20000
; log_interval = 500
; test_interval = 2000
total_step = 1e6
test_interval = 2e6
log_interval = 1e3

[ENV_CONFIG]
scenario = grid_world
agent = ia2c_fp
seed = 0
nrow = 10
ncol = 10
n_agent = 5
randomize_state = False
initial_state = [[0,0],[0,1],[1,2],[1,3],[2,4]]
desired_state = [[4,4],[4,3],[4,2],[2,3],[1,3]]
use_gpu = True
coop_gamma = -1