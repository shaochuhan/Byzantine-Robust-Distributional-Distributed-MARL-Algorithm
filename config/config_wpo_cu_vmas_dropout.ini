[ENV_CONFIG]
scenario = vmas_dropout
agent = wpo_cu
n_agent = 10
seed = 42
vmas_scenario = dropout
num_envs = 1
max_steps = 600
continuous_actions = False
device = cuda
coop_gamma = 0.9
use_gpu = True

[MODEL_CONFIG]
rmsp_alpha = 0.99
rmsp_epsilon = 1e-5
num_fc = 128
num_lstm = 128
lr_init = 1e-4
lr_min = 1e-6
lr_decay = linear
value_coef = 1.0
entropy_coef = 0.01
max_grad_norm = 5.0
gamma = 0.99
reward_norm = 0
reward_clip = 10.0
batch_size = 60
use_variance_rescaling = True
epsilon_mean = 0.0025
epsilon_stddev = 1e-6
policy_loss_scale = 1.0
kl_loss_scale = 1.0
dual_loss_scale = 1.0

[TRAIN_CONFIG]
total_step = 1000000
test_interval = 5000
log_interval = 1000
save_interval = 10000

